# グローバル設定
username: admin 
timeout: 30s

# 共通サブスクリプション設定
common_arista_subscriptions: &common_arista_subs #設定名：&エイリアス名
  skip-verify: true #安全な接続のための署名検証をスキップ
  insecure: true #TLSを使用しないgRPC接続を確立したい
  password: admin
  encoding: json_ietf #エンコーディング形式
  subscriptions: #サブスクリプションのリスト
    - cpu
    - mem
    - interface_state
    - boot_time

# ターゲットデバイス設定
targets:
  sw01:6030: *common_arista_subs #ターゲット名:ポート番号:共通サブスクリプションのエイリアス名
  rt01:6030: *common_arista_subs

# サブスクリプションの詳細
subscriptions:

  cpu:
    paths:
      - components/component/cpu
    mode: stream
    stream-mode: sample
    sample-interval: 5s

  mem:
    paths:
      - components/component/state/memory/
    mode: stream
    stream-mode: sample
    sample-interval: 5s

  interface_state:
    paths:
      - interfaces/interface[name=*]/state/counters
      - interfaces/interface[name=*]/state/admin-status
      - interfaces/interface[name=*]/state/oper-status
    mode: stream
    stream-mode: sample
    sample-interval: 5s

  boot_time:
    paths:
      - system/state/boot-time
    mode: stream
    stream-mode: sample
    sample-interval: 60s

# 出力設定
outputs:
  prom: #出力設定名
    type: prometheus #prometheus形式(Pull型)
    listen: :9273 #listenするポート番号
    append-subscription-name: true
    event-processors: #メッセージを処理するプロセッサのリスト 
      - eos-version
      - trim-prefixes
      - bounce-map
      - rename-eos-interface
      - rename-source

# プロセッサ設定
processors:
  rename-eos-interface: #プロセッサ名
    event-strings: # stringに関するイベント
      tag-names: #タグ名
        - "^interface_name"
      transforms: #変換
        - replace: #Ethernetをethに変換
            apply-on: "value"
            old: "Ethernet(\\d+)"
            new: "eth$1"
  bounce-map:
    event-strings:
      value-names: #値名
        - oper-status
        - admin-status
      transforms:
        - replace: #UPを1に、DOWNを0に変換
            apply-on: "value"
            old: "UP"
            new: "1"
        - replace:
            apply-on: "value"
            old: "DOWN"
            new: "0"
  eos-version:
    event-strings:
      value-names:
        - ".*version$"
        - ".*arch$"
      transforms:
        - replace:
            apply-on: "value"
            old: "EOS"
            new: "eos"
  trim-prefixes:
    event-strings:
      value-names:
        - ".*"
      transforms:
        - path-base:
            apply-on: "name"
  rename-source:
    event-strings:
      tag-names:
        - "^source"
      transforms:
        - replace:
            apply-on: "value"
            old: "(\\d+):(\\d+)"
            new: "$1"
