!
frr version 8.4.1_git
frr defaults datacenter
hostname RT-T-01
log syslog informational
no ipv6 forwarding
service integrated-vtysh-config
!
interface lo
 ip address 10.1.0.21/32
exit
!
interface eth3
 ip address 192.168.11.100/26
exit
!
router bgp 65021
 bgp router-id 10.1.0.21
 no bgp default ipv4-unicast
 bgp bestpath as-path multipath-relax
 neighbor LEAF peer-group
 neighbor LEAF remote-as external
 neighbor LEAF bfd
 neighbor LEAF timers connect 5
 neighbor LEAF capability extended-nexthop
 neighbor SERVERS peer-group
 neighbor SERVERS remote-as external
 neighbor eth1 interface peer-group LEAF
 neighbor eth2 interface peer-group LEAF
 bgp listen limit 20
 bgp listen range 192.168.11.0/26 peer-group SERVERS
 !
 address-family ipv4 unicast
  redistribute connected route-map ACCEPT_DC_LOCAL
  neighbor LEAF activate
  neighbor SERVERS activate
  neighbor SERVERS default-originate
  neighbor SERVERS route-map ACCEPT_ONLY_ANYCAST in
  neighbor SERVERS route-map ADVERTISE_DEFONLY out
  maximum-paths 64
 exit-address-family
exit
!
ip prefix-list DC_LOCAL_SUBNET seq 5 permit 10.1.0.0/24 ge 32
ip prefix-list ANYCAST_VIP seq 5 permit 20.5.5.5/32
ip prefix-list ANYCAST_VIP seq 10 permit 20.110.1.1/32
ip prefix-list DEFONLY seq 5 permit 0.0.0.0/0
!
route-map ACCEPT_DC_LOCAL permit 10
 match ip address prefix-list DC_LOCAL_SUBNET
exit
!
route-map ACCEPT_ONLY_ANYCAST permit 10
 match ip address prefix-list ANYCAST_VIP
exit
!
route-map ADVERTISE_DEFONLY permit 10
 match ip address prefix-list DEFONLY
exit
!
route-map PERMIT_ALL permit 10
exit
!
end
