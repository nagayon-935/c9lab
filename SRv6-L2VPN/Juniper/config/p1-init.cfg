hostname p1
!
no aaa root
!
username admin privilege 15 role network-admin secret admin@123
!
service routing protocols model multi-agent
!
interface Ethernet1
   description to_pe1
   no switchport
   ip address 172.16.14.4/24
   ipv6 address 14:14:14::4/64
   ipv6 enable
   isis enable 1
   isis network point-to-point
   isis hello-padding
   mtu 9000
!
interface Ethernet2
   description to_pe2
   no switchport
   ip address 172.16.24.4/24
   ipv6 address 24:24:24::4/64
   ipv6 enable
   isis enable 1
   isis network point-to-point
   isis hello-padding
   mtu 9000
!
interface Ethernet3
   description to_pe3
   no switchport
   ip address 172.16.34.4/24
   ipv6 address 34:34:34::4/64
   ipv6 enable
   isis enable 1
   isis network point-to-point
   isis hello-padding
   mtu 9000
!
interface Loopback0
   ip address 4.4.4.4/32
   ipv6 address 4:4:4::4/128
   ipv6 enable
   isis enable 1
!
ip routing
ipv6 unicast-routing
!
router isis 1
   net 49.0001.0000.0000.0004.00
   is-type level-2
   log-adjacency-changes
   !
   address-family ipv4 unicast
   !
   address-family ipv6 unicast
!
end
