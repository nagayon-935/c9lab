hostname p1
!
no aaa root
!
username admin privilege 15 role network-admin secret admin@123
!
service routing protocols model multi-agent
!
interface Ethernet1
   description to_pe1
   no switchport
   ipv6 enable
   ipv6 address 14:14:14::4/64
!
interface Ethernet2
   description to_pe2
   no switchport
   ipv6 enable
   ipv6 address 24:24:24::4/64
!
interface Ethernet3
   description to_pe3
   no switchport
   ipv6 enable
   ipv6 address 34:34:34::4/64
!
interface Loopback0
   ipv6 enable
   ipv6 address 4:4:4::4/128
!
ip routing
ipv6 unicast-routing
!
end
