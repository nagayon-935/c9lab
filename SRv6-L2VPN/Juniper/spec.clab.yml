name: srv6

topology:
  kinds:
    juniper_vjunosrouter:
      memory: 5GiB
      cpu: 2
      qemu-args: "-cpu host"
    arista_ceos:
      memory: 1GiB

  nodes:
    pe1:
      kind: juniper_vjunosrouter
      image: ghcr.io/nagayon-935/network-images/juniper_vjunos_router:25.2R1.9
      startup-config: ./config/pe1-init.cfg
    pe2:
      kind: juniper_vjunosrouter
      image: ghcr.io/nagayon-935/network-images/juniper_vjunos_router:25.2R1.9
      startup-config: ./config/pe2-init.cfg
    pe3:
      kind: juniper_vjunosrouter
      image: ghcr.io/nagayon-935/network-images/juniper_vjunos_router:25.2R1.9
      startup-config: ./config/pe3-init.cfg
    p1:
      kind: juniper_vjunosrouter
      image: ghcr.io/nagayon-935/network-images/juniper_vjunos_router:25.2R1.9
      startup-config: ./config/p1-init.cfg
    ce1:
      kind: arista_ceos
      image: ghcr.io/nagayon-935/network-images/ceos:4.34.1F
      startup-config: ./config/ce1-init.cfg
    ce2:
      kind: arista_ceos
      image: ghcr.io/nagayon-935/network-images/ceos:4.34.1F
      startup-config: ./config/ce2-init.cfg
    ce3:
      kind: arista_ceos
      image: ghcr.io/nagayon-935/network-images/ceos:4.34.1F
      startup-config: ./config/ce2-init.cfg

  links:
    - endpoints: [ "pe1:eth1", "p1:eth1" ]
    - endpoints: [ "pe1:eth2", "ce1:eth1" ]
    - endpoints: [ "ce1:eth2", "pe2:eth2" ]
    - endpoints: [ "p1:eth2", "pe2:eth1" ]
    - endpoints: [ "p1:eth3", "pe3:eth1" ]
    - endpoints: [ "ce2:eth1", "pe2:eth3" ]
    - endpoints: [ "ce3:eth1", "pe3:eth2" ]
