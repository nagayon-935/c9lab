name: SRv6-L2VPN
prefix: ""

topology:

  defaults:
    kind: cisco_xrd

  kinds:
    cisco_xrd:
      image: ghcr.io/nagayon-935/network-images/cisco_xrd:25.4.1-v1
    linux:
      image: nicolaka/netshoot:latest

  nodes:

    PE-01:
      startup-config: config/PE-01.cfg
    P-01:
      startup-config: config/P-01.cfg
    PE-02:
      startup-config: config/PE-02.cfg
    CE-01:
      startup-config: config/CE-01.cfg
    CE-02:
      startup-config: config/CE-02.cfg

  links:
    - endpoints: [ "PE-01:Gi0-0-0-1", "P-01:Gi0-0-0-1" ]
    - endpoints: [ "P-01:Gi0-0-0-2", "PE-02:Gi0-0-0-1" ]
    - endpoints: [ "CE-01:Gi0-0-0-1", "PE-01:Gi0-0-0-2" ]
    - endpoints: [ "CE-02:Gi0-0-0-1", "PE-02:Gi0-0-0-2" ]
