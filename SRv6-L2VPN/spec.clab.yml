name: SRv6-L2VPN
prefix: ""

topology:

  defaults:
    kind: cisco_xrd

  kinds:
    cisco_xrd:
      image: ghcr.io/nagayon-935/network-images/cisco_xrd:25.2.2-v1
    linux:
      image: nicolaka/netshoot:latest

  nodes:

    RT-01:
      startup-config: config/RT-01.cfg
    RT-02:
      startup-config: config/RT-02.cfg
    RT-03:
      startup-config: config/RT-03.cfg
    # RT-04:
    #   startup-config: config/RT-04.cfg
    # RT-05:
    #   startup-config: config/RT-05.cfg
    SV-01:
      kind: linux
      exec:
        - ip link add link eth1 name eth1.100 type vlan id 100
        - ip link set dev eth1.100 up
        - ip link set dev eth1.100 address aa:bb:cc:01:00:01
        - ip addr add 100.100.100.1/24 dev eth1.100
    SV-02:
      kind: linux
      exec:
        - ip link add link eth1 name eth1.100 type vlan id 100
        - ip link set dev eth1.100 up
        - ip link set dev eth1.100 address aa:bb:cc:01:00:02
        - ip addr add 100.100.100.2/24 dev eth1.100
    # SV-03:
    #   kind: linux
    #   exec:
    #     - ip link add bond0 type bond mode 802.3ad miimon 100 lacp_rate fast
    #     - ip link set eth1 down
    #     - ip link set eth2 down
    #     - ip link set eth1 master bond0
    #     - ip link set eth2 master bond0
    #     - ip link set bond0 up
    #     - ip link set eth1 up
    #     - ip link set eth2 up
    #     - ip link add link bond0 name bond0.100 type vlan id 100
    #     - ip link set dev bond0.100 address aa:bb:cc:01:00:03
    #     - ip addr add 100.100.100.3/24 dev bond0.100
    #     - ip link set bond0.100 up

  links:
    - endpoints: [ "RT-01:Gi0-0-0-1", "RT-02:Gi0-0-0-1" ]
    - endpoints: [ "RT-02:Gi0-0-0-2", "RT-03:Gi0-0-0-1" ]
    - endpoints: [ "SV-02:eth1", "RT-03:Gi0-0-0-2" ]
    - endpoints: [ "SV-01:eth1", "RT-01:Gi0-0-0-2" ]
    # - endpoints: [ "RT-04:Gi0-0-0-1", "RT-02:Gi0-0-0-3" ]
    # - endpoints: [ "RT-05:Gi0-0-0-1", "RT-02:Gi0-0-0-4" ]
    # - endpoints: [ "SV-03:eth1", "RT-04:Gi0-0-0-2" ]
    # - endpoints: [ "SV-03:eth2", "RT-05:Gi0-0-0-2" ]
