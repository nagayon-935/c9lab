### Test04 VLANが定義されていない ###

name: test04
prefix: ''

mgmt:
  network: mgmt-net
  mtu: 1500
  ipv4-subnet: 172.100.100.0/24

topology:
  defaults:
    kind: linux

  kinds:
    linux:
      image: nicolaka/netshoot:latest
      binds:
        - /usr/share/zoneinfo/Asia/Tokyo:/etc/localtime:ro
    ceos:
      image: ceos:4.32.2.1F

  nodes:
    sw01:
      kind: ceos
      group: switch
      mgmt-ipv4: 172.100.100.31
      startup-config: ./configs/sw01/cEoS.conf
    sw02:
      kind: ceos
      group: switch
      mgmt-ipv4: 172.100.100.32
      startup-config: ./configs/sw02/cEoS.conf
    sw03:
      kind: ceos
      group: switch
      mgmt-ipv4: 172.100.100.33
      startup-config: ./configs/sw03/cEoS.conf
    sw04:
      kind: ceos
      group: switch
      mgmt-ipv4: 172.100.100.34
      startup-config: ./configs/sw04/cEoS.conf
    pc01:
      group: server
      mgmt-ipv4: 172.100.100.11
      exec:
      - ip addr add 172.16.0.1/24 dev eth1
      - ip route del default
      - ip route add default via 172.16.20.254 dev eth1
    pc02:
      group: server
      mgmt-ipv4: 172.100.100.12
      exec:
      - ip addr add 172.16.254.1/24 dev eth1
      - ip route del default
      - ip route add default via 172.16.20.254 dev eth1
    pc03:
      group: server
      mgmt-ipv4: 172.100.100.13
      exec:
      - ip addr add 172.16.0.254/24 dev eth1
      - ip route del default
      - ip route add default via 172.16.20.254 dev eth1
    pc04:
      group: server
      mgmt-ipv4: 172.100.100.14
      exec:
      - ip addr add 172.16.254.254/24 dev eth1
      - ip route del default
      - ip route add default via 172.16.20.254 dev eth1

    ### TELEMETRY STACK ###
    gnmic:
      mgmt-ipv4: 172.100.100.41
      image: ghcr.io/openconfig/gnmic:0.39.1
      binds:
      - configs/gnmic-config.yml:/gnmic-config.yml:ro
      cmd: --config /gnmic-config.yml --log subscribe
      group: '10'
    prometheus:
      mgmt-ipv4: 172.100.100.42
      image: quay.io/prometheus/prometheus:v2.54.1
      binds:
      - configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      cmd: --config.file=/etc/prometheus/prometheus.yml
      ports:
      - 9090:9090
      group: '10'
    grafana:
      mgmt-ipv4: 172.100.100.43
      image: grafana/grafana:11.2.0
      binds:
      - configs/grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yaml:ro
      - configs/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - configs/grafana/dashboards:/var/lib/grafana/dashboards
      ports:
      - 3000:3000
      env:
        GF_INSTALL_PLUGINS: andrewbmchugh-flow-panel
        GF_ORG_ROLE: Admin
        GF_ORG_NAME: Main Org
        GF_AUTH_ANONYMOUS_ENABLED: 'true'
        GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
        GF_AUTH_ANONYMOUS: 'true'
        GF_AUTH_OAUTH_AUTO_LOGIN: 'true'
      group: '10'

  links:
    - endpoints: ["sw01:eth1", "pc01:eth1"]
    - endpoints: ["sw01:eth2", "pc02:eth1"]
    - endpoints: ["sw01:eth3", "sw03:eth1"]
    - endpoints: ["sw02:eth1", "pc03:eth1"]
    - endpoints: ["sw02:eth2", "pc04:eth1"]
    - endpoints: ["sw02:eth3", "sw04:eth1"]
    - endpoints: ["sw03:eth2", "sw04:eth2"]
