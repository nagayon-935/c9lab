!
hostname RT-05
username clab
 group root-lr
 group cisco-support
 secret 10 $6$mKPN0pKaZ70.....$E3rexa4.NzrG.bxC5mmyKM6gSiDrwpRIShegUympjXc9KyZQKNoFTdtElksEPEg/F9WxyM.PXIfmvcYXtVvGM0
!
grpc
 port 9339
 no-tls
 address-family dual
!
line default
 transport input ssh
!
netconf-yang agent
 ssh
!
interface Loopback0
 ipv6 address 5:5:5::5/128
!
interface MgmtEth0/RP0/CPU0/0
!
interface GigabitEthernet0/0/0/1
 description to-RT-04
 ipv6 address 45:45:45::5/64
!
interface GigabitEthernet0/0/0/2
 description to-RT-06
 ipv6 address 56:56:56::5/64
!
router static
 address-family ipv4 unicast
  0.0.0.0/0 MgmtEth0/RP0/CPU0/0 172.20.20.1
 !
 address-family ipv6 unicast
  ::/0 MgmtEth0/RP0/CPU0/0 3fff:172:20:20::1
 !
!
router isis 1
 is-type level-2-only
 net 49.0001.0000.0000.0005.00
 flex-algo 128
  advertise-definition
  metric-type delay
 !
 address-family ipv6 unicast
  metric-style wide
  fast-reroute per-prefix
  fast-reroute per-prefix ti-lfa
  segment-routing srv6
   locator ALGO0
   !
   locator ALGO128
   !
  !
 !
 interface Loopback0
  passive
  address-family ipv6 unicast
  !
 !
 interface GigabitEthernet0/0/0/1
  point-to-point
  address-family ipv6 unicast
   fast-reroute per-prefix
   fast-reroute per-prefix ti-lfa
   metric 20
  !
 !
 interface GigabitEthernet0/0/0/2
  point-to-point
  address-family ipv6 unicast
   fast-reroute per-prefix
   fast-reroute per-prefix ti-lfa
   metric 20
  !
 !
!
performance-measurement
 interface GigabitEthernet0/0/0/1
  delay-measurement
   advertise-delay 1000
  !
 !
 interface GigabitEthernet0/0/0/2
  delay-measurement
   advertise-delay 1000
  !
 !
!
segment-routing
 srv6
  encapsulation
   source-address 5:5:5::5
  !
  locators
   locator ALGO0
    micro-segment behavior unode psp-usd
    prefix cafe:0:5::/48
   !
   locator ALGO128
    micro-segment behavior unode psp-usd
    prefix cafe:80:5::/48
    algorithm 128
   !
  !
 !
!
ssh server v2
ssh server netconf vrf default
end
