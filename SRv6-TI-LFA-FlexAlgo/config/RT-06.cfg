!
hostname RT-06
username clab
 group root-lr
 group cisco-support
 secret 10 $6$mKPN0pKaZ70.....$E3rexa4.NzrG.bxC5mmyKM6gSiDrwpRIShegUympjXc9KyZQKNoFTdtElksEPEg/F9WxyM.PXIfmvcYXtVvGM0
!
grpc
 port 9339
 no-tls
 address-family dual
!
line default
 transport input ssh
!
netconf-yang agent
 ssh
!
vrf CUST-A
 address-family ipv4 unicast
  import route-target
   65100:100
  !
  export route-target
   65100:100
  !
 !
!
interface Loopback0
