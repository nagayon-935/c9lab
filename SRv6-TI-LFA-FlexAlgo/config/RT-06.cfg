!
interface MgmtEth0/RP0/CPU0/0
!
interface GigabitEthernet0/0/0/1
 description to-RT-03
 ipv6 address 36:36:36::6/64
!
interface GigabitEthernet0/0/0/2
 description to-RT-05
 ipv6 address 56:56:56::6/64
!
interface GigabitEthernet0/0/0/3
 description to-CE-02
 vrf CUST-A
 ipv4 address 100.0.6.254 255.255.255.0
!
router static
 address-family ipv4 unicast
  0.0.0.0/0 MgmtEth0/RP0/CPU0/0 172.20.20.1
 !
 address-family ipv6 unicast
  ::/0 MgmtEth0/RP0/CPU0/0 3fff:172:20:20::1
 !
!
router isis 1
 is-type level-2-only
 net 49.0001.0000.0000.0006.00
 flex-algo 128
  advertise-definition
  metric-type delay
 !
 address-family ipv6 unicast
  metric-style wide
  fast-reroute per-prefix
  fast-reroute per-prefix ti-lfa
  segment-routing srv6
   locator ALGO0
   !
   locator ALGO128
   !
  !
 !
 interface Loopback0
  passive
  address-family ipv6 unicast
  !
 !
 interface GigabitEthernet0/0/0/1
